<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Purple Black Hole</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(ellipse at center, #03070c 0%, #000000 75%);
    overflow: hidden;
  }
  #bh-container { position: relative; width: 100vw; height: 100vh; }
  #bh-container canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="bh-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   TUNABLES — change these to taste
   ============================================================ */
const CONFIG = {
  spinSpeed:   0.6,                 // disk rotation speed
  camDist:     16.0,                // camera distance from hole
  camElev:     0.16,                // camera elevation (radians); small = near edge-on
  diskInner:   [0.92, 0.70, 1.00],  // bright lavender (hot inner edge)
  diskOuter:   [0.45, 0.08, 0.85],  // deep purple (cooler outer)
  nebula:      [0.30, 0.05, 0.55],  // faint background haze tint
  renderScale: 1.0,                 // 0.5–1.0; lower = faster on weak GPUs
};
/* ============================================================ */

const container = document.getElementById('bh-container');

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, premultipliedAlpha: false });
renderer.setPixelRatio(1);
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const geometry = new THREE.PlaneGeometry(2, 2);

const uniforms = {
  iResolution:   { value: new THREE.Vector2() },
  iTime:         { value: 0 },
  spinSpeed:     { value: CONFIG.spinSpeed },
  camDist:       { value: CONFIG.camDist },
  camElev:       { value: CONFIG.camElev },
  diskColorInner:{ value: new THREE.Vector3(...CONFIG.diskInner) },
  diskColorOuter:{ value: new THREE.Vector3(...CONFIG.diskOuter) },
  nebulaColor:   { value: new THREE.Vector3(...CONFIG.nebula) },
};

const vertexShader = `
  void main() { gl_Position = vec4(position.xy, 0.0, 1.0); }
`;

const fragmentShader = `
precision highp float;

uniform vec2  iResolution;
uniform float iTime;
uniform float spinSpeed;
uniform float camDist;
uniform float camElev;
uniform vec3  diskColorInner;
uniform vec3  diskColorOuter;
uniform vec3  nebulaColor;

#define STEPS    300
#define RS       1.0      // Schwarzschild radius (event horizon)
#define DISK_IN  2.6      // inner edge of accretion disk
#define DISK_OUT 9.0      // outer edge
#define DT       0.14     // integration step

// --- hash / value noise ---
float hash(vec3 p){
  p = fract(p * 0.3183099 + 0.1);
  p *= 17.0;
  return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}
float noise(vec3 x){
  vec3 i = floor(x);
  vec3 f = fract(x);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
        mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
    mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
        mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y),
    f.z);
}
float fbm(vec3 p){
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++){ v += a * noise(p); p *= 2.0; a *= 0.5; }
  return v;
}

void main(){
  // screen coords, aspect-corrected
  vec2 uv = (gl_FragCoord.xy - 0.5 * iResolution.xy) / iResolution.y;

  // --- camera (orbits in the y=0 disk plane, lifted slightly by camElev) ---
  vec3 camPos  = vec3(0.0, sin(camElev) * camDist, -cos(camElev) * camDist);
  vec3 forward = normalize(-camPos);
  vec3 right   = normalize(cross(vec3(0.0, 1.0, 0.0), forward));
  vec3 up      = cross(forward, right);
  float fov    = 1.3;
  vec3 dir     = normalize(forward + uv.x * fov * right + uv.y * fov * up);

  // --- geodesic raymarch ---
  vec3 p   = camPos;
  vec3 vel = dir;
  // conserved squared angular momentum (vel is unit) — the bend strength
  vec3 hVec = cross(p, vel);
  float h2  = dot(hVec, hVec);

  vec3  color    = vec3(0.0);
  bool  captured = false;

  for (int i = 0; i < STEPS; i++){
    float r = length(p);
    if (r < RS) { captured = true; break; }      // fell through the horizon

    // GR photon bend: a = -1.5 h^2 * r_hat / r^5
    vec3 accel = -1.5 * h2 * p / pow(r, 5.0);
    vel += accel * DT;
    vec3 np = p + vel * DT;

    // accretion-disk plane crossing (y = 0)
    if (p.y * np.y < 0.0){
      float t   = p.y / (p.y - np.y);
      vec3  hit = mix(p, np, t);
      float rd  = length(hit.xz);
      if (rd > DISK_IN && rd < DISK_OUT){
        float ang    = atan(hit.z, hit.x);
        float omega  = spinSpeed * pow(rd, -1.5) * 10.0;   // Keplerian shear
        float swirl  = ang + iTime * omega;
        float radial = (rd - DISK_IN) / (DISK_OUT - DISK_IN);

        // gaseous turbulence
        float n = fbm(vec3(cos(swirl) * rd, sin(swirl) * rd, iTime * 0.15) * 0.7);

        float bright = pow(1.0 - radial, 1.6) * (0.55 + 0.9 * n);

        // relativistic Doppler beaming: side rotating toward camera is brighter
        vec3  tang    = normalize(vec3(-hit.z, 0.0, hit.x));
        float beam    = dot(tang, normalize(-dir));
        float doppler = 1.0 + 0.7 * beam;
        bright *= doppler;

        vec3 col = mix(diskColorInner, diskColorOuter, radial);
        color += col * max(bright, 0.0) * 1.7;
      }
    }

    p = np;
    // escaped: far away and heading outward
    if (r > 32.0 && dot(vel, p) > 0.0) break;
  }

  // background for rays that escaped without much disk light
  if (!captured && dot(color, color) < 0.02){
    vec3  d    = normalize(vel);
    float s    = hash(floor(d * 260.0));
    float star = smoothstep(0.9965, 1.0, s);
    color += vec3(star) * vec3(0.85, 0.85, 1.0);
    color += nebulaColor * 0.025 * fbm(d * 4.0);
  }

  // tone map + gentle gamma
  color = color / (color + vec3(1.0));
  color = pow(color, vec3(0.85));

  // Alpha: event horizon stays solid black; disk light fades from bright to
  // transparent at its outer edge; empty space is fully transparent.
  float luma = dot(color, vec3(0.299, 0.587, 0.114));
  float alpha = captured ? 1.0 : smoothstep(0.004, 0.07, luma);

  gl_FragColor = vec4(color, alpha);
}
`;

const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
scene.add(new THREE.Mesh(geometry, material));

function resize(){
  const w = container.clientWidth, h = container.clientHeight;
  const scale = CONFIG.renderScale;
  renderer.setSize(w, h, false);
  renderer.domElement.width  = Math.floor(w * scale);
  renderer.domElement.height = Math.floor(h * scale);
  uniforms.iResolution.value.set(w * scale, h * scale);
}
window.addEventListener('resize', resize);
resize();

const start = performance.now();
function animate(){
  uniforms.iTime.value = (performance.now() - start) / 1000;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
